name: fastestway

description: FastestWay Navigation App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Storage
  shared_preferences: ^2.3.2

  # TTS
  flutter_tts: ^4.2.2

  # OpenStreetMap
  flutter_map: ^7.0.2

  # LatLng
  latlong2: ^0.9.1

  # GPS
  geolocator: ^13.0.2

  # HTTP
  http: ^1.2.2

  # Share
  share_plus: ^10.0.2

  # URL Launcher
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true